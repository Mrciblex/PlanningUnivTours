spring.application.name=info

server.port=8080
server.servlet.contextPath=/univtime

spring.datasource.url=jdbc:postgresql://localhost:5432/univ_time
spring.datasource.username=
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Desactive les logs de demarrage (info)
spring.main.log-startup-info=false

# Met le niveau de log global à ERROR (cache les INFO et WARN)
logging.level.root=ERROR
logging.level.org.springframework=ERROR
logging.level.com.univtime=INFO