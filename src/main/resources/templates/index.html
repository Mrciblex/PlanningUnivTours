<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns="http://www.w3.org/1999/html">
    <head>
        <th:block th:replace="~{layout/head :: defaultHead}"></th:block>
        <link rel="stylesheet" th:href="@{/css/index.css}">

        <title>UnivTime - Acceuil</title>
    </head>
    <body class="bg-[#2F3E47]">
        <th:block th:replace="~{layout/header :: defaultHeader}"></th:block>

        <div class="min-h-screen flex flex-col items-center justify-center">
            <!-- Titre -->
            <div class="text-center mb-20 animate-in">
                <h1 class="text-white">Acceuil de UnivTime</h1>
            </div>

            <!-- Les 2 cercles -->
            <div class="flex gap-30 mb-12 animate-in">
                <!-- Cercle 1: Ancien EDT -->
                <div class="flex flex-col items-center w-40">
                    <button class="avatar-button" onclick="ancienMenu()">
                        <div class="avatar-content new-edt">
                            <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"></circle>
                                <polyline points="12 6 12 12 16 14"></polyline>
                            </svg>
                        </div>
                    </button>
                    <div class="avatar-label text-center">Ancien EDT</div>
                </div>

                <!-- Cercle 2: Nouveau EDT -->
                <div class="flex flex-col items-center w-40">
                    <button class="avatar-button ">
                        <div class="avatar-content old-edt">
                            <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                        </div>
                    </button>
                    <div class="avatar-label text-center">Nouveau EDT</div>
                </div>

                <!-- Sélection des promotions les plus récentes -->
                <div class="w-full max-w-2xl animate-in">
                    <div id="selection_promo_recente" class="dropdown-container">
                        <h3 class="text-xl font-bold mb-4">Tous les EDTs</h3>
                        <div class="custom-scrollbar overflow-y-auto">
                            <!-- Affichage de 1 à 3 promotions : les dernières ouvertes -->
                            <div th:each="promo, iterStat : ${promotions}"
                                 th:classappend="${iterStat.index % 4 == 0} ? 'bg-gradient-to-r from-cyan-600 to-cyan-700' :
                                                 ${iterStat.index % 4 == 1} ? 'bg-gradient-to-r from-purple-600 to-purple-700' :
                                                 ${iterStat.index % 4 == 2} ? 'bg-gradient-to-r from-pink-600 to-pink-700' :
                                    'bg-gradient-to-r from-indigo-600 to-indigo-700'"
                                    class="promo-item"
                                 th:onclick="'accessPromo(\'' + ${promo.id} + '\')'">
                                <div class="promo-icon"
                                     th:classappend="${iterStat.index % 4 == 0} ? 'bg-cyan-500' :
                                                     ${iterStat.index % 4 == 1} ? 'bg-purple-500' :
                                                     ${iterStat.index % 4 == 2} ? 'bg-pink-500' :
                                        'bg-indigo-500'">
                                    <span th:text="${promo.code}">L3</span>
                                </div>
                                <div class="promo-info">
                                    <div class="promo-name" th:text="${promo.nom}">Licence 3 Informatique</div>
                                    <div class="promo-meta">
                                        <span th:text="${promo.nbEtudiants}">45</span> étudiants
                                        <p> • </p>
                                        <span th:text="${promo.annee}">2024-2025</span>
                                    </div>
                                </div>
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="9 18 15 12 9 6"></polyline>
                                </svg>
                            </div>

                            <!-- Si il n'y pas de promotions -->
                            <div th:if="${promotions == null or promotions.isEmpty()}" class="text-center py-8 opacity-60">
                                <p>Aucun EDT disponible</p>
                            </div>
                        </div>

                        <div class="scroll-indicator" th:if="${promotions != null and promotions.size() > 4}">
                            Cliqué ici pour voir plus
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
