<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns="http://www.w3.org/1999/html">
    <head>
        <th:block th:replace="~{layout/head :: defaultHead}"></th:block>
        <link rel="stylesheet" th:href="@{/css/index.css}">

        <title>UnivTime - Acceuil</title>
    </head>
    <body class="bg-[#2F3E47]">
        <th:block th:replace="~{layout/header :: defaultHeader}"></th:block>

        <div class="min-h-screen flex flex-col items-center justify-center">
            <!-- Titre -->
            <div class="text-center mb-20 animate-in">
                <h1 class="text-white">Acceuil de UnivTime</h1>
            </div>

            <!-- Les 2 cercles -->
            <div class="flex gap-30 mb-12 animate-in">
                <!-- Cercle 1: Ancien EDT -->
                <div class="flex flex-col items-center w-40">
                    <button class="avatar-button" onclick="ancienMenu()">
                        <div class="avatar-content new-edt">
                            <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"></circle>
                                <polyline points="12 6 12 12 16 14"></polyline>
                            </svg>
                        </div>
                    </button>
                    <div class="avatar-label text-center">Ancien EDT</div>
                </div>

                <!-- Cercle 2: Nouveau EDT -->
                <div class="flex flex-col items-center w-40">
                    <button class="avatar-button ">
                        <div class="avatar-content old-edt">
                            <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                        </div>
                    </button>
                    <div class="avatar-label text-center">Nouveau EDT</div>
                </div>
            </div>
        </div>
    </body>
</html>
