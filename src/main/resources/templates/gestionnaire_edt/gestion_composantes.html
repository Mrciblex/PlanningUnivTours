<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{layout/head :: defaultHead}"></th:block>
    <link rel="stylesheet" th:href="@{/css/gestion_composantes.css}">
    <title>UnivTime - Gestion Composantes</title>
</head>

<body>

<th:block th:replace="~{layout/header :: defaultHeader}"></th:block>

<div class="min-h-screen p-20">
    <div class="container mx-auto max-w-7xl">

        <div class="flex justify-between items-center mb-8">
            <h2 class="text-4xl font-bold text-white">
                Gestion des Composantes
            </h2>

            <!-- Bouton ajouter (avec promo si présent) -->
            <button onclick="document.getElementById('modal').style.display='block'"
                    class="btn-primary">
                + Ajouter une composante
            </button>
        </div>

        <!-- TABLE -->
        <div class="table-container">
            <table class="data-table">
                <thead>
                <tr>
                    <th>Nom</th>
                    <th>Volume Total</th>
                    <th>CM</th>
                    <th>TD</th>
                    <th>TP</th>
                    <th>Actions</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="c : ${composantes}">
                    <td th:text="${c.nomComposante}"></td>
                    <td th:text="${c.volumeHoraireTotal}"></td>

                    <td>
                        <span th:text="${c.volumeHoraireCM}"></span>
                        /
                        <span th:text="${c.blocHoraireCM}"></span>
                    </td>

                    <td>
                        <span th:text="${c.volumeHoraireTD}"></span>
                        /
                        <span th:text="${c.blocHoraireTD}"></span>
                    </td>

                    <td>
                        <span th:text="${c.volumeHoraireTP}"></span>
                        /
                        <span th:text="${c.blocHoraireTP}"></span>
                    </td>

                    <td>

                        <!-- ===================== -->
                        <!-- MODIFIER -->
                        <!-- ===================== -->

                        <!-- Si idpromo existe -->
                        <form th:if="${param.idpromo != null}"
                              th:action="@{/gestionnaire-edt/composantes/{idpromo}/{id}/edit(
                                idpromo=${param.idpromo},
                                id=${c.idComposante})}"
                              method="post"
                              style="display:inline;">
                            <button class="btn-edit">Modifier</button>
                        </form>

                        <!-- Sinon -->
                        <form th:if="${param.idpromo == null}"
                              th:action="@{/gestionnaire-edt/composantes/{id}/edit(
                                id=${c.idComposante})}"
                              method="post"
                              style="display:inline;">
                            <button class="btn-edit">Modifier</button>
                        </form>


                        <!-- ===================== -->
                        <!-- SUPPRIMER -->
                        <!-- ===================== -->

                        <!-- Avec promo -->
                        <form th:if="${param.idpromo != null}"
                              th:action="@{/gestionnaire-edt/composantes/{idpromo}/{id}/delete(
                                idpromo=${param.idpromo},
                                id=${c.idComposante})}"
                              method="post"
                              style="display:inline;">
                            <button class="btn-delete">Supprimer</button>
                        </form>

                        <!-- Sans promo -->
                        <form th:if="${param.idpromo == null}"
                              th:action="@{/gestionnaire-edt/composantes/{id}/delete(
                                id=${c.idComposante})}"
                              method="post"
                              style="display:inline;">
                            <button class="btn-delete">Supprimer</button>
                        </form>

                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(composantes)}">
                    <td colspan="6"
                        class="text-center text-red-600 font-bold">
                        Aucune composante
                    </td>
                </tr>

                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- ===================== -->
<!-- MODAL AJOUT -->
<!-- ===================== -->

<div id="modal" class="modal">
    <div class="modal-content">

        <h3 class="text-2xl font-bold mb-6">
            Ajouter une composante
        </h3>

        <!-- Si on est dans /promo/{idpromo} -->
        <form th:if="${param.idpromo != null}"
              th:action="@{/gestionnaire-edt/composantes/promo/{idpromo}/new(
                idpromo=${param.idpromo})}"
              method="post">

            <div th:replace="~{::formFields}"></div>

        </form>

        <!-- Si on est dans /gestionnaire-edt/composantes -->
        <form th:if="${param.idpromo == null}"
              th:action="@{/gestionnaire-edt/composantes/new}"
              method="post">

            <div th:replace="~{::formFields}"></div>

        </form>

        <!-- Fragment des champs -->
        <th:block th:fragment="formFields">

            <div class="form-group">
                <label>Nom *</label>
                <input type="text" name="nomComposante" required>
            </div>

            <div class="form-group">
                <label>Volume Horaire Total *</label>
                <input type="number" name="volumeHoraireTotal" required>
            </div>

            <div class="form-group">
                <label>CM</label>
                <input type="number" name="volumeHoraireCM" placeholder="Volume CM">
                <input type="number" name="blocHoraireCM" placeholder="Bloc CM">
            </div>

            <div class="form-group">
                <label>TD</label>
                <input type="number" name="volumeHoraireTD" placeholder="Volume TD">
                <input type="number" name="blocHoraireTD" placeholder="Bloc TD">
            </div>

            <div class="form-group">
                <label>TP</label>
                <input type="number" name="volumeHoraireTP" placeholder="Volume TP">
                <input type="number" name="blocHoraireTP" placeholder="Bloc TP">
            </div>

            <div class="flex gap-3 mt-6">
                <button type="button"
                        onclick="document.getElementById('modal').style.display='none'"
                        class="btn-edit flex-1">
                    Annuler
                </button>

                <button type="submit"
                        class="btn-primary flex-1">
                    Enregistrer
                </button>
            </div>

        </th:block>

    </div>
</div>

</body>
</html>
