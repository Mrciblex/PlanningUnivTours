<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns="http://www.w3.org/1999/html">
    <head>
        <th:block th:replace="~{layout/head :: defaultHead}"></th:block>
        <link rel="stylesheet" th:href="@{/css/gestion_groupes.css}">

        <title>UnivTime - Gestion Groupes</title>
    </head>
    <body>
        <th:block th:replace="~{layout/head :: defaultHeader}"></th:block>

        <div class="min-h-screen p-20">
            <div class="container mx-auto max-w-7xl">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-4xl font-bold text-white">Gestion des Groupes Elèves</h2>
                    <button onclick="openAddModal()" class="btn-primary">+ Ajouter un groupe</button>
                </div>

                <!-- Table -->
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                        <tr>
                            <th>Groupe</th>
                            <th>Nombre Groupe</th>
                            <th>Sous Groupe</th>
                            <th>Nombre Sous Groupe</th>
                            <th>Promo</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="prof : ${professeurs}">
                            <td class="font-semibold text-tours-green-light" th:text="${prof.nom}"></td>
                            <td th:text="${prof.nom}"></td>
                            <td th:text="${prof.prenom}"></td>
                            <td th:text="${promo.intervenantExterieur == true ? OUI : NON}"></span>
                            </td>
                            <td>
                                <button th:onclick="|editComposante('${prof.id}',
                                                                    '${prof.nom}',
                                                                    '${prof.prenom}',
                                                                    '${prof.intervenantExterieur}
                                                        )|" class="btn-edit mr-2">Modifier</button>
                                <button th:onclick="|deleteProfesseur('${prof.id}', '${prof.nom}')|" class="btn-delete">Supprimer</button>
                            </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(professeurs)}">
                            <td colspan="6" class="text-center text-red-700 font-bold">Aucun professeur</td>
                        </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </div>

        <!-- Pop Up Ajouter/Modfier -->
        <div id="promoModal" class="modal">
            <div class="modal-content">
                <p id="modalTitle" class="text-2xl font-bold mb-6 text-white">Ajouter une promotion</p>

                <form th:action="@{/promo/save}" method="post">
                    <input type="hidden" id="promoId" name="id">

                    <div class="form-group">
                        <label>Nom *</label>
                        <input type="text" id="nom" name="nom" required placeholder="Ex: Licence 3 Informatique">
                    </div>

                    <div class="form-group">
                        <label>Année *</label>
                        <input type="text" id="annee" name="annee" required placeholder="Ex: 2024-2025">
                    </div>

                    <div class="form-group">
                        <label>Semestre 1</label>
                        <div class="date-group">
                            <div>
                                <label class="text-xs text-slate-400">Début</label>
                                <input type="date" id="dateDebutS1" name="dateDebutS1">
                            </div>
                            <div>
                                <label class="text-xs text-slate-400">Fin</label>
                                <input type="date" id="dateFinS1" name="dateFinS1">
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Semestre 2</label>
                        <div class="date-group">
                            <div>
                                <label class="text-xs text-slate-400">Début</label>
                                <input type="date" id="dateDebutS2" name="dateDebutS2">
                            </div>
                            <div>
                                <label class="text-xs text-slate-400">Fin</label>
                                <input type="date" id="dateFinS2" name="dateFinS2">
                            </div>
                        </div>
                    </div>

                    <div class="flex gap-3 mt-6">
                        <button type="button" onclick="closeModal()" class="btn-edit flex-1">Annuler</button>
                        <button type="submit" class="btn-primary flex-1">Enregistrer</button>
                    </div>
                </form>
            </div>

            <!-- Pop Up Ajouter/Modfier -->
        </div>
    </body>
</html>
