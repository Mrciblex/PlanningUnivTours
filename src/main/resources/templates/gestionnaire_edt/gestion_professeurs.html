<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns="http://www.w3.org/1999/html">
    <head>
        <th:block th:replace="~{layout/head :: defaultHead}"></th:block>
        <link rel="stylesheet" th:href="@{/css/gestion_professeurs.css}">

        <title>UnivTime - Gestion Professeurs</title>
    </head>
    <body>
         <th:block th:replace="~{layout/header :: defaultHeader}"></th:block>

        <div class="min-h-screen p-20">
            <div class="container mx-auto max-w-7xl">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-4xl font-bold text-white">Gestion des Enseignants</h2>
                    <button onclick="openAddModal()" class="btn-primary">+ Ajouter un(e) enseignante</button>
                </div>

                <!-- Table -->
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                        <tr>
                            <th>Nom</th>
                            <th>Prénom</th>
                            <th>Intervenant Extérieur</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="prof : ${professeurs}">
                            <td class="font-semibold text-tours-green-light" th:text="${prof.nom}"></td>
                            <td th:text="${prof.nom}"></td>
                            <td th:text="${prof.prenom}"></td>
                            <td th:text="${promo.intervenantExterieur == true ? OUI : NON}"></span>
                            </td>
                            <td>
                                <button th:onclick="|editComposante('${prof.id}',
                                                                    '${prof.nom}',
                                                                    '${prof.prenom}',
                                                                    '${prof.intervenantExterieur}
                                                        )|" class="btn-edit mr-2">Modifier</button>
                                <button th:onclick="|deleteProfesseur('${prof.id}', '${prof.nom}')|" class="btn-delete">Supprimer</button>
                            </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(professeurs)}">
                            <td colspan="6" class="text-center text-red-700 font-bold">Aucun professeur</td>
                        </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </div>

        <!-- Pop Up Ajouter/Modfier -->
        <div id="profModal" class="modal transform-gpu">
            <div class="modal-content">
                <p id="modalTitle" class="text-2xl font-bold mb-6 text-white">Ajouter un professeur</p>

                <form th:action="@{/professeur/save}" method="post">
                    <input type="hidden" id="profId" name="id">

                    <div class="form-group">
                        <label>Nom *</label>
                        <input type="text" id="nom" name="nom" required placeholder="Ex: DESPORT">
                    </div>

                    <div class="form-group">
                        <label>Prénom *</label>
                        <input type="text" id="prenom" name="prenom" required placeholder="Ex: Pierre">
                    </div>

                    <div class="form-group">
                        <label>Intervenant Extérieur *</label>
                        <input th:type="radio" >
                        <input type="text" id="intervenantE" name="intervenantE" required placeholder="Ex: Pierre">
                    </div>

                    <div class="flex gap-3 mt-6">
                        <button type="button" onclick="closeModal()" class="btn-edit flex-1">Annuler</button>
                        <button type="submit" class="btn-primary flex-1">Enregistrer</button>
                    </div>
                </form>
            </div>

            <!-- Pop Up Supprimer -->
        </div>
    </body>
</html>
