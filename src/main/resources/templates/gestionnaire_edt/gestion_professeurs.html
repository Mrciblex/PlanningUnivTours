<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout/head :: defaultHead}"></th:block>
    <link rel="stylesheet" th:href="@{/css/gestion_professeurs.css}">
    <title>UnivTime - Gestion Professeurs</title>
</head>
<body>
<th:block th:replace="~{layout/header :: defaultHeader}"></th:block>

<div class="min-h-screen p-20">
    <div class="container mx-auto max-w-7xl">

        <!-- En-tête -->
        <div class="flex justify-between items-center mb-8">
            <div>
                <h2 class="text-4xl font-bold text-white">Gestion des Enseignants</h2>
                <p th:if="${idPromo != null}" class="text-tours-green-light mt-1 text-lg">
                    Promo ID : <span th:text="${idPromo}" class="font-semibold"></span>
                </p>
            </div>
            <div class="flex gap-3">
                <a th:if="${idPromo != null}"
                   th:href="@{/gestionnaire-edt/professeurs/promo/{idPromo}(idPromo=${idPromo})}"
                   class="btn-edit">← Tous les professeurs de la promo</a>
                <button onclick="openAddModal()" class="btn-primary">+ Ajouter un(e) enseignant(e)</button>
            </div>
        </div>

        <!-- Table -->
        <div class="table-container">
            <table class="data-table">
                <thead>
                <tr>
                    <th>Nom</th>
                    <th>Prénom</th>
                    <th>Intervenant Extérieur</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="prof : ${professeurs}">
                    <td class="font-semibold text-tours-green-light" th:text="${prof.nomProf}"></td>
                    <td th:text="${prof.prenomProf}"></td>
                    <td>
                        <span th:if="${prof.intervenantExterieur}" class="badge-oui">OUI</span>
                        <span th:unless="${prof.intervenantExterieur}" class="badge-non">NON</span>
                    </td>
                    <td>
                        <button th:if="${idPromo != null}"
                                th:onclick="|editProfesseur('${prof.idProf}', '${prof.nomProf}', '${prof.prenomProf}', '${prof.intervenantExterieur}', ${idPromo})|"
                                class="btn-edit mr-2">Modifier</button>
                        <button th:if="${idPromo == null}"
                                th:onclick="|editProfesseur('${prof.idProf}', '${prof.nomProf}', '${prof.prenomProf}', '${prof.intervenantExterieur}', null)|"
                                class="btn-edit mr-2">Modifier</button>

                        <button th:if="${idPromo != null}"
                                th:onclick="|deleteProfesseur('${prof.idProf}', '${prof.nomProf}', ${idPromo})|"
                                class="btn-delete">Supprimer</button>
                        <button th:if="${idPromo == null}"
                                th:onclick="|deleteProfesseur('${prof.idProf}', '${prof.nomProf}', null)|"
                                class="btn-delete">Supprimer</button>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(professeurs)}">
                    <td colspan="4" class="text-center text-red-700 font-bold py-6">Aucun professeur trouvé</td>
                </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>

<!-- ===== Modal Ajouter / Modifier ===== -->
<div id="profModal" class="modal hidden">
    <div class="modal-content">
        <p id="modalTitle" class="text-2xl font-bold mb-6 text-white">Ajouter un professeur</p>

        <form id="profForm" method="post">
            <input type="hidden" id="profId" name="id">
            <input type="hidden" id="formIdPromo" th:value="${idPromo}">

            <div class="form-group">
                <label for="nomProf">Nom *</label>
                <input type="text" id="nomProf" name="nomProf" required placeholder="Ex: DESPORT">
            </div>

            <div class="form-group">
                <label for="prenomProf">Prénom *</label>
                <input type="text" id="prenomProf" name="prenomProf" required placeholder="Ex: Pierre">
            </div>

            <div class="form-group">
                <label>Intervenant Extérieur *</label>
                <div class="flex gap-6 mt-2">
                    <label class="flex items-center gap-2 text-white cursor-pointer">
                        <input type="radio" id="intervenantOui" name="intervenantExterieur" value="true">
                        OUI
                    </label>
                    <label class="flex items-center gap-2 text-white cursor-pointer">
                        <input type="radio" id="intervenantNon" name="intervenantExterieur" value="false" checked>
                        NON
                    </label>
                </div>
            </div>

            <div class="flex gap-3 mt-6">
                <button type="button" onclick="closeModal()" class="btn-edit flex-1">Annuler</button>
                <button type="submit" class="btn-primary flex-1">Enregistrer</button>
            </div>
        </form>
    </div>
</div>

<!-- ===== Modal Confirmation Suppression ===== -->
<div id="deleteModal" class="modal hidden">
    <div class="modal-content">
        <p class="text-2xl font-bold mb-4 text-white">Confirmer la suppression</p>
        <p class="text-gray-300 mb-6">
            Voulez-vous vraiment supprimer
            <span id="deleteNom" class="font-bold text-tours-green-light"></span> ?
        </p>
        <form id="deleteForm" method="post">
            <div class="flex gap-3">
                <button type="button" onclick="closeDeleteModal()" class="btn-edit flex-1">Annuler</button>
                <button type="submit" class="btn-delete flex-1">Supprimer</button>
            </div>
        </form>
    </div>
</div>

<script th:src="@{/js/gestion_professeur.js}"></script>
</body>
</html>
