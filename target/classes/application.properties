spring.application.name=info

server.port=8080
server.servlet.contextPath=/univtime

spring.datasource.url=jdbc:postgresql://localhost:5432/univ_time
spring.datasource.username=
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.ddl-auto=validate
#spring.main.allow-circular-references=true
spring.jpa.show-sql=true

# Desactive les logs de demarrage (info)
spring.main.log-startup-info=false

# Met le niveau de log globalement a ERROR (cache les INFO et WARN)
logging.level.root=ERROR
logging.level.org.springframework=ERROR
logging.level.com.univtime=INFO